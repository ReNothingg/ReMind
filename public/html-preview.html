<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html,
        body,
        #preview {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
        }

        html,
        body {
            overflow: hidden;
        }

        #preview {
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="preview" sandbox="allow-scripts"></iframe>
    <script>
        const withResponsiveViewport = (html) => {
            const source = typeof html === 'string' ? html : '';
            if (/<meta\s+[^>]*name=["']viewport["'][^>]*>/i.test(source)) {
                return source;
            }

            const viewport = '<meta name="viewport" content="width=device-width, initial-scale=1">';
            if (/<head(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<head(\s[^>]*)?>/i, (head) => `${head}${viewport}`);
            }
            if (/<html(?:\s[^>]*)?>/i.test(source)) {
                return source.replace(/<html(\s[^>]*)?>/i, (htmlTag) => `${htmlTag}<head>${viewport}</head>`);
            }
            return `<!doctype html><html><head>${viewport}</head><body>${source}</body></html>`;
        };

        window.addEventListener('message', (event) => {
            if (event.source !== window.parent || event.data?.type !== 'remind:html-preview') {
                return;
            }

            document.getElementById('preview').srcdoc = withResponsiveViewport(event.data.html);
        });
    </script>
</body>
</html>
