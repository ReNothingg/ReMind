<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html,
        body,
        #preview {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
        }

        html,
        body {
            overflow: hidden;
        }

        #preview {
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="preview" sandbox="allow-forms allow-scripts"></iframe>
    <script>
        window.addEventListener('message', (event) => {
            if (event.data?.type !== 'remind:html-preview') {
                return;
            }

            document.getElementById('preview').srcdoc =
                typeof event.data.html === 'string' ? event.data.html : '';
        });
    </script>
</body>
</html>
