services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
  app:
    environment:
      - ENABLE_STRICT_HTTPS=True
      - GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github_app_private_key
    secrets:
      - github_app_private_key
  worker:
    environment:
      - ENABLE_STRICT_HTTPS=True

secrets:
  github_app_private_key:
    file: ${GITHUB_APP_PRIVATE_KEY_PATH:?Set GITHUB_APP_PRIVATE_KEY_PATH to the host PEM file}
