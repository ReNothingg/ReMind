x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    networks:
      - edge
      - backend

  app:
    image: remind-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "5000"
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - SECRET_ROTATION_EPOCH=${SECRET_ROTATION_EPOCH:-0}
      - AI_PROVIDER_API_KEY=${AI_PROVIDER_API_KEY:?Set AI_PROVIDER_API_KEY}
      - AI_PROVIDER_MODEL_NAME=${AI_PROVIDER_MODEL_NAME:?Set AI_PROVIDER_MODEL_NAME}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:?Set URL-encoded DATABASE_URL}
      - REDIS_URL=${REDIS_URL:?Set URL-encoded REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?Set URL-encoded CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?Set URL-encoded CELERY_RESULT_BACKEND}
      - EMAIL_SENDER=${EMAIL_SENDER:?Set EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:?Set EMAIL_PASSWORD}
      - GITHUB_APP_ID=${GITHUB_APP_ID:?Set GITHUB_APP_ID}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:?Set GITHUB_APP_CLIENT_ID}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:?Set GITHUB_APP_CLIENT_SECRET}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG:?Set GITHUB_APP_SLUG}
      - GITHUB_PUBLIC_BASE_URL=${GITHUB_PUBLIC_BASE_URL:?Set GITHUB_PUBLIC_BASE_URL}
      - GITHUB_OAUTH_ENCRYPTION_KEY=${GITHUB_OAUTH_ENCRYPTION_KEY:?Set GITHUB_OAUTH_ENCRYPTION_KEY}
      - LOCALHOST_MODE=False
      - CORS_ALLOW_LOCAL_ORIGINS=False
      - ALLOW_CROSS_SUBDOMAIN_SESSION_COOKIE=False
      - PUBLIC_METRICS_ENABLED=False
      - PUBLIC_OPENAPI_ENABLED=False
      - ALLOW_GUEST_CHATS_SAVE=False
      - ENABLE_STRICT_HTTPS=False
      - VALIDATE_USER_AGENT=True
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      init-storage:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.80'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - backend
      - edge

  worker:
    image: remind-app:latest
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - SECRET_ROTATION_EPOCH=${SECRET_ROTATION_EPOCH:-0}
      - AI_PROVIDER_API_KEY=${AI_PROVIDER_API_KEY:?Set AI_PROVIDER_API_KEY}
      - AI_PROVIDER_MODEL_NAME=${AI_PROVIDER_MODEL_NAME:?Set AI_PROVIDER_MODEL_NAME}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:?Set URL-encoded DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?Set URL-encoded CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?Set URL-encoded CELERY_RESULT_BACKEND}
      - REDIS_URL=${REDIS_URL:?Set URL-encoded REDIS_URL}
      - ENABLE_STRICT_HTTPS=False
      - ALLOW_CROSS_SUBDOMAIN_SESSION_COOKIE=False
      - PUBLIC_METRICS_ENABLED=False
      - PUBLIC_OPENAPI_ENABLED=False
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      init-storage:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.80'
          memory: 2G
    networks:
      - backend
      - edge

  init-storage:
    image: remind-app:latest
    user: "0:0"
    command:
      - sh
      - -c
      - chown -R 1001:1001 /app/database /app/logs && chmod -R u+rwX,go-rwx /app/database /app/logs
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    restart: "no"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  migrate:
    image: remind-app:latest
    command: python scripts/prepare_database.py
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY}
      - AI_PROVIDER_API_KEY=${AI_PROVIDER_API_KEY:?Set AI_PROVIDER_API_KEY}
      - AI_PROVIDER_MODEL_NAME=${AI_PROVIDER_MODEL_NAME:?Set AI_PROVIDER_MODEL_NAME}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:?Set URL-encoded DATABASE_URL}
      - REDIS_URL=${REDIS_URL:?Set URL-encoded REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?Set URL-encoded CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?Set URL-encoded CELERY_RESULT_BACKEND}
      - EMAIL_SENDER=${EMAIL_SENDER:?Set EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:?Set EMAIL_PASSWORD}
      - LOCALHOST_MODE=False
      - CORS_ALLOW_LOCAL_ORIGINS=False
      - ALLOW_CROSS_SUBDOMAIN_SESSION_COOKIE=False
      - ENABLE_STRICT_HTTPS=False
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-storage:
        condition: service_completed_successfully
    restart: "no"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging: *default-logging

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: remind
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      POSTGRES_DB: remind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remind -d remind_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - backend

  redis:
    image: redis:7-alpine
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --protected-mode
      - "yes"
      - --bind
      - 0.0.0.0
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      - --rename-command
      - CONFIG
      - ""
      - --rename-command
      - FLUSHALL
      - ""
      - --rename-command
      - FLUSHDB
      - ""
      - --rename-command
      - SHUTDOWN
      - ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging: *default-logging
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  edge:
  backend:
    internal: true
