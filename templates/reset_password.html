<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>ReMind | Новый пароль</title>
    <link rel="icon" type="image/svg+xml" href="/icons/branding/logo.svg">
    <style>
        :root {
            color-scheme: dark;
            --bg: #111214;
            --surface: #1b1d22;
            --border: #31343c;
            --text: #f8fafc;
            --muted: #aab0bd;
            --accent: #e5e7eb;
            --danger: #f87171;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, Manrope, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100% - 32px, 440px);
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--surface);
            padding: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .brand img {
            width: 34px;
            height: 34px;
        }

        h1 {
            margin: 0;
            font-size: 1.35rem;
            line-height: 1.2;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        label {
            display: block;
            margin: 14px 0 8px;
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #121419;
            color: var(--text);
            padding: 10px 12px;
            font: inherit;
        }

        button,
        a.button {
            display: inline-flex;
            min-height: 44px;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent);
            border-radius: 10px;
            background: var(--accent);
            color: #111214;
            padding: 10px 14px;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .secondary {
            background: transparent;
            color: var(--text);
        }

        .message {
            margin-bottom: 16px;
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 10px 12px;
            color: var(--text);
        }

        .message.danger {
            border-left-color: var(--danger);
        }

        .message.success {
            border-left-color: var(--success);
        }
    </style>
</head>

<body>
    <main>
        <section class="panel" aria-labelledby="reset-title">
            <div class="brand">
                <img src="/icons/branding/logo-light.svg" alt="">
                <h1 id="reset-title">Новый пароль</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="message {{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <p>Пароль должен содержать минимум 8 символов, цифру и специальный символ.</p>

            <form method="post" action="/reset_password/{{ token }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label for="password">Новый пароль</label>
                <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="100">
                <label for="confirm_password">Повторите пароль</label>
                <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required minlength="8" maxlength="100">
                <div class="actions">
                    <button type="submit">Сохранить пароль</button>
                    <a class="button secondary" href="/login">Назад ко входу</a>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
